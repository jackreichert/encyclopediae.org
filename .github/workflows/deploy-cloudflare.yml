name: Deploy Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - "signup-worker/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-signup-worker:
    name: Deploy signup Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          test -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}"

      - name: Sync Worker secrets (env.signup)
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY
          environment: signup
        env:
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}

      - name: Deploy Worker (env.signup)
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env signup
